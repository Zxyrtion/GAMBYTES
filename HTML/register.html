<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Gambytes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold text-danger" href="index.html">
        <img src="LOGO.png" alt="Logo" width="28" height="28" class="me-2 align-middle" />
        Gambytes
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html#home">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="index.html#features">Features</a></li>
          <li class="nav-item"><a class="nav-link" href="index.html#about">About</a></li>
        </ul>
        <a href="login.html" class="btn btn-danger ms-3">LOGIN</a>
      </div>
    </div>
  </nav>

  <!-- Register Section -->
  <section class="hero-section d-flex align-items-center justify-content-center text-white" style="min-height:100vh;">
    <div class="container" style="max-width:400px; z-index:3;">
      <div class="card bg-dark bg-opacity-75 border-0 shadow-lg">
        <div class="card-body">
          <div class="text-center mb-3">
          </div>
          <h2 class="fw-bold text-danger text-center mb-4">Register</h2>
          <form id="registerForm">
            <div class="mb-3">
              <label for="name" class="form-label text-light">Full Name</label>
              <input type="text" class="form-control" id="name" placeholder="Enter full name" required>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label text-light">Email address</label>
              <input type="email" class="form-control" id="email" placeholder="Enter email" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label text-light">Password</label>
              <input type="password" class="form-control" id="password" placeholder="Enter password" required>
            </div>
            <div class="mb-3">
              <label for="confirmPassword" class="form-label text-light">Confirm Password</label>
              <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm password" required>
            </div>
            <a href="dashboard.html" type="submit" class="btn btn-danger w-100 fw-bold">Register</a>
          </form>
          <div class="mt-3 text-center">
            <a href="login.html" class="text-danger text-decoration-none">Already have an account? Login</a>
          </div>
        </div>
      </div>
    </div>
  </section>

<footer class="bg-secondary text-white text-center py-3 mt-auto">
    <p class="mb-0 small">© 2025 Gambytes By: DAVE DELA CERNA | Empowering Responsible Financial Recovery</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
